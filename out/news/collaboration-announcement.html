"d\"],{\"children\":[\"__PAGE__\",{},[[\"$L3\",[\"$\",\"$L4\",null,{\"news\":{\"slug\":\"collaboration-announcement\",\"frontmatter\":{\"id\":2,\"title\":\"HackIT 與多家科技公司建立合作夥伴關係\",\"date\":\"2024-02-20\",\"author\":\"張明德\",\"category\":\"合作消息\",\"image\":\"https://images.unsplash.com/photo-1600880292203-757bb62b4baf?q=80\u0026w=2070\u0026auto=format\u0026fit=crop\",\"isFeatured\":true,\"tags\":[\"產業合作\",\"實習機會\",\"贊助夥伴\"]},\"content\":\"\\n# HackIT 與多家科技公司建立合作夥伴關係\\n\\n我們很榮幸地宣布，HackIT 已與多家頂尖科技公司建立正式合作夥伴關係。這些合作將為我們的社群成員帶來更多實習機會、專業指導和專案資源。\\n\\n## 合作夥伴\\n\\n我們的新合作夥伴包括：\\n\\n- **科技巨頭 A 公司**：將提供雲端資源和技術講座\\n- **軟體開發 B 公司**：開放實習崗位並提供技術導師\\n- **新創企業 C 公司**：為黑客松活動提供獎金和指導\\n- **教育機構 D 學院**：協助課程開發和認證\\n\\n## 學生福利\\n\\n透過這些合作關係，我們社群的學生成員將獲得：\\n\\n1. 獨家實習面試機會\\n2. 專業人士一對一指導\\n3. 專案開發所需的免費雲端資源\\n4. 參與合作企業的內部講座和工作坊\\n\\n## 未來計劃\\n\\n接下來的幾個月，我們將陸續舉辦線上和實體的合作夥伴交流活動，讓社群成員有機會直接與這些企業互動。詳細活動安排將在官網和社群媒體上公布。\\n\\n感謝我們的合作夥伴對青少年程式教育的支持！\\n\\n---\\n\\n張明德\\nHackIT 合作協調人\"},\"slug\":\"collaboration-announcement\"}],null],null],null]},[null,[\"$\",\"$L5\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"news\",\"children\",\"$6\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\"}]],null]},[null,[\"$\",\"$L5\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"news\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\"}]],null]},[[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/css/1aa629f8ea37d66a.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"zh
