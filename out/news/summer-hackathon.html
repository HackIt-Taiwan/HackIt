$\",\"$L4\",null,{\"news\":{\"slug\":\"summer-hackathon\",\"frontmatter\":{\"id\":3,\"title\":\"2024 暑期青少年黑客松即將開放報名\",\"date\":\"2024-03-05\",\"author\":\"李婉茹\",\"category\":\"活動預告\",\"image\":\"https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80\u0026w=2070\u0026auto=format\u0026fit=crop\",\"isFeatured\":true,\"tags\":[\"黑客松\",\"暑期活動\",\"競賽\",\"獎學金\"]},\"content\":\"\\n# 2024 暑期青少年黑客松即將開放報名\\n\\n今年夏天最盛大的科技活動來了！2024 年 HackIT 暑期青少年黑客松將於 7 月 15 日至 17 日舉行，報名將於下月初開放。\\n\\n## 活動主題：永續科技\\n\\n本次黑客松的主題為「永續科技」，我們鼓勵參賽者開發能夠促進環境保護、資源節約和永續發展的創新解決方案。\\n\\n## 參賽資格\\n\\n- 13-18 歲青少年\\n- 不限技術背景和經驗\\n- 可個人或組隊報名（每隊 2-5 人）\\n\\n## 豐厚獎品\\n\\n- **冠軍隊伍**：新台幣 10 萬元獎金和創投會面機會\\n- **亞軍隊伍**：新台幣 5 萬元獎金和企業參訪機會\\n- **季軍隊伍**：新台幣 3 萬元獎金和專業技術指導\\n- **最佳技術獎**：開發工具組和線上課程會員資格\\n- **最佳設計獎**：設計軟體授權和相關周邊設備\\n\\n## 重要日期\\n\\n- **報名開始**：2024 年 4 月 1 日\\n- **報名截止**：2024 年 6 月 30 日\\n- **線上說明會**：2024 年 5 月 15 日\\n- **黑客松日期**：2024 年 7 月 15-17 日\\n\\n## 先修準備\\n\\n想要提前準備的同學，可以參加我們的前導工作坊系列：\\n1. 專案管理與團隊協作（4 月份）\\n2. 原型設計與使用者體驗（5 月份）\\n3. 演示技巧與提案準備（6 月份）\\n\\n敬請期待正式報名訊息，並關注我們的社群媒體獲取最新消息！\\n\\n---\\n\\n李婉茹\\nHackIT 活動總監\"},\"slug\":\"summer-hackathon\"}],null],null],null]},[null,[\"$\",\"$L5\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"news\",\"children\",\"$6\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\"}]],null]},[null,[\"$\",\"$L5\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"news\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\"}]],null]},[[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_
